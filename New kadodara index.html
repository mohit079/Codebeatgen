<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BRTS Ticket Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,800&display=swap&family=Nunito&family=Work+Sans:wght@500&display=swap" rel="stylesheet"/>

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
      text-align: center;
      color: #575757;
    }

    .container {
      margin-top: 20px;
    }

    .ticket {
      width: 250px;
      border: 1px solid #000;
      padding: 15px;
      margin: 20px auto;
      text-align: left;
      background: #fff;
      color: #454545;
      font-family: 'Nunito', sans-serif;
      min-height: 450px;
      position: relative;
    }

    .ticket::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("https://i.postimg.cc/85DzR9Kp/1000328098-(3).png");
      background-repeat: no-repeat;
      background-size: 100% auto;
      background-position: center;
      z-index: 999;
      pointer-events: none;
    }

    .ticket .logo-img {
      display: block;
      margin: 0 auto;
      height: auto;
      filter: grayscale(100%) brightness(0.9) sepia(1)
              hue-rotate(160deg) saturate(3);
    }

    .sitilink-line {
      width: 220px;
      filter: grayscale(100%) brightness(0.95) sepia(1)
              hue-rotate(160deg) saturate(3);
    }

    .suman-line {
      width: 155px;
      filter: grayscale(100%) brightness(0.6) sepia(1)
              hue-rotate(0deg) saturate(5);
    }

    .ticket .from-img {
      display: block;
      width: 55px;
      height: auto;
      margin: 0;
      filter: grayscale(100%) brightness(0.7) sepia(1)
              hue-rotate(160deg) saturate(3);
    }

    .custom-colored-img {
      filter: grayscale(100%) brightness(0.5) sepia(1)
              hue-rotate(160deg) saturate(3);
    }

    .ticket p {
      font-size: 18.4px;
      margin: 0;
      line-height: 1;
      color: #575757;
    }

    .ticket .date-time {
      font-family: 'Mulish', sans-serif;
      font-weight: 800;
      font-size: 17.6px;
      margin: 2px 0;
    }

    .ticket .valid-until {
      font-size: 13px;
      color: #575757;
      margin: 70;
      line-height: 1;
    }

    .qr-code {
      text-align: center;
      margin-top: 0px;
      margin-bottom: 0px;
    }

    .qr-code canvas {
      width: 85px !important;
      height: 85px !important;
    }

    .footer {
      text-align: left;
      margin-top: 0px;
      color: #444544;
    }

    .footer p {
      font-size: 13.3px;
      margin: 2px 0;
    }

    .controls {
      margin-bottom: 20px;
    }

    .print-button {
      padding: 10px 15px;
      font-size: 16px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
</head>

<body>

<div class="container">

  <div class="controls">
    <label for="ticket-quantity">Select Ticket Quantity:</label>

    <select id="ticket-quantity">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
      <option value="35">35</option>
    </select>

    <button class="print-button" onclick="generateTickets()">
      Generate Ticket
    </button>
  </div>

  <div id="tickets-container"></div>

  <button class="print-button" onclick="window.print()">
    Print Ticket
  </button>

</div>

<script>

const CONFIG = {
  GSTIN: "24AATCS6546D1Z2",
  SAC: "996411",
  ROUTE_ID: "19U",
  STATION_CODE: "6883",
  EQUIPMENT_CODE: "68830011",
  EQUIPMENT_TYPE: "1B",
  OFFICE_CODE: "0000",
  COMPANY_CODE: "0102",
  CUSTOMER_CARE: "18002330233"
};

function getLastTicketNumber() {
  let lastNumber = localStorage.getItem("lastTicketNumber");

  return lastNumber
    ? parseInt(lastNumber)
    : 8501040501215089;
}

function setLastTicketNumber(number) {
  localStorage.setItem("lastTicketNumber", number);
}

function generateTickets() {

  const ticketContainer =
    document.getElementById("tickets-container");

  ticketContainer.innerHTML = "";

  const quantity =
    parseInt(document.getElementById("ticket-quantity").value);

  let currentTicketNumber = getLastTicketNumber();

  for (let i = 0; i < quantity; i++) {

    currentTicketNumber++;

    const ticketElement = document.createElement("div");
    ticketElement.classList.add("ticket");

    const now = new Date();

    const date = now
      .toLocaleDateString("en-GB")
      .replace(/\//g, '-');

    const time =
      now.toTimeString().split(' ')[0];

    const entryValidUntil =
      new Date(now.getTime() + 15 * 60000);

    const entryValidTime =
      entryValidUntil.toTimeString().split(' ')[0];

    const validUntil =
      new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate(),
        23,
        59,
        59
      );

    const validUntilTime =
      validUntil.toTimeString().split(' ')[0];

    ticketElement.innerHTML = `

      <img class="logo-img sitilink-line"
      src="https://i.postimg.cc/NMYj6SJF/SITILINK-LOGO-4.png">

      <img class="logo-img suman-line"
      src="https://i.postimg.cc/L4DnT4M9/Suman-logo.png">

      <p style="font-size: 17px;">
        T .No:<span>${currentTicketNumber}</span>
      </p>

      <p>
        <span class="date-label">Date:</span>
        &nbsp;&nbsp;
        <span class="date-time">${date}</span>
        <span class="date-time">${time}</span>
      </p>

      <p style="margin-bottom: 0px;">From:</p>

      <img class="from-img custom-colored-img"
      style="margin-bottom: 17px; width: 160px;"
      src="https://i.postimg.cc/x8BCzCWd/kadodara-with-guj-1.png">

      <img class="from-img custom-colored-img"
      style="margin-bottom: 2px; width: 142px;"
      src="https://i.postimg.cc/MZLX4PXQ/total-fare-30-2-0.png">

      <p class="valid-until">
        Entry Valid within: ${entryValidTime}
      </p>

      <p class="valid-until">
        Ticket Valid upto: ${date} ${validUntilTime}
      </p>

      <div class="qr-code" id="qrcode-${i}"></div>

      <div class="footer">
        <p>This Ticket is Non-Refundable</p>

        <p>
          Customer Care No:
          ${CONFIG.CUSTOMER_CARE}
        </p>

        <p>-----------------------------------------</p>
      </div>
    `;

    ticketContainer.appendChild(ticketElement);

    const qrCode = new QRCodeStyling({

      width: 96,
      height: 96,

      data:
`T. No: ${currentTicketNumber}
Valid: ${validUntilTime}
Route: ${CONFIG.ROUTE_ID}
GSTIN: ${CONFIG.GSTIN}`,

      dotsOptions: {
        color: "#6b6b6b",
        type: "square",
        size: 0.7
      },

      backgroundOptions: {
        color: "#ffffff"
      },

      cornersSquareOptions: {
        type: "square"
      },

      cornersDotOptions: {
        type: "square"
      }
    });

    qrCode.append(
      document.getElementById(`qrcode-${i}`)
    );
  }

  setLastTicketNumber(currentTicketNumber);
}

</script>

</body>
</html>
